name: Cross-platform Build

on:
  push:
    branches:
      - main
      - master
      - Ann_work
  pull_request:
    branches:
      - main
      - master

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-multimedia-dev build-essential cmake
      
      - name: Configure CMake
        run: cmake -B build -S .
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          modules: 'qtmultimedia'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
      
      - name: Configure CMake
        run: cmake -B build -S . -G "MinGW Makefiles"
      
      - name: Build
        run: cmake --build build --parallel
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/
